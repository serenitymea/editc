scoring:
  heuristic_weights:
    motion_p90: 0.5
    motion_peak_ratio: 0.1
    beat_alignment: 0.35
    bass_energy: 0.3
    blur_inverse: 0.15
    buildup: 0.45
    rms_peak: 0.35
  global_weights:
    motion: 0.65
    audio: 0.55
    visual: 0.2
    context: 0.25
windows:
  motion_window_seconds: 4.0
  temporal_window_frames: 10
  clip_search_step_seconds: 0.1
  flow_sample_fps_divider: 5
  visual_sample_fps_divider: 4
optical_flow:
  pyr_scale: 0.6
  levels: 4
  winsize: 20
  iterations: 6
  poly_n: 7
  poly_sigma: 1.8
  flags: 0
video_processing:
  resize_height: 720
  flow_resolution:
  - 320
  - 180
  symmetry_max_width: 150
face_detection:
  enabled: false
  scale_factor: 1.3
  min_neighbors: 5
clip_selection:
  overlap_decay_ratio: 0.7
ml:
  feature_order:
  - motion_mean
  - motion_max
  - motion_p90
  - motion_std
  - motion_peak_ratio
  - rms_mean
  - rms_peak
  - rms_contrast
  - spectral_centroid
  - spectral_rolloff
  - mfcc_variance
  - bass_energy
  - vocal_probability
  - onset_density
  - beat_alignment_score
  - blur_score
  - edge_density
  - color_variance
  - avg_brightness
  - contrast_mean
  - face_present
  - face_size_ratio
  - symmetry
  - rule_of_thirds
  - text_presence
  - motion_momentum
  - audio_momentum
  - combined_buildup
  - relative_position
  - motion_derivative
  - duration
audio_loops:
  default: 1
